<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Magus">
  <!--
    Magus app icon. Full-bleed background (no rounded corners) so it stays
    correct as a maskable icon: Android crops to its own shape, iOS rounds
    apple-touch-icons itself. The ◬ mark (U+25EC) is drawn as geometry, not a
    font glyph, so it renders identically regardless of installed fonts.
    Mark lives inside the central 80% safe zone for maskable cropping.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A640EE"/>
      <stop offset="1" stop-color="#7C1FC6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <polygon points="256,124 401,375 111,375"
           fill="none" stroke="#ffffff" stroke-width="30"
           stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="256" cy="291" r="27" fill="#ffffff"/>
</svg>
