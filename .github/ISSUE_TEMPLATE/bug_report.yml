name: Bug report
description: Report a problem with Magus
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](https://github.com/wir-drei-digital/magus/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any relevant output. This is automatically formatted as code.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How are you running Magus?
      placeholder: |
        - Magus version / commit:
        - Deployment: self-host (docker-compose) / mix phx.server / other
        - Elixir / OTP version:
        - PostgreSQL version:
        - Browser (if a UI bug):
    validations:
      required: true
